services:
  oneround-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      ONEROUND_HTTP_ADDR: ":8080"
      ONEROUND_DATABASE_PATH: "/app/data/oneround.db"
      ONEROUND_WECHAT_USE_FAKE_AUTH: "false"
    volumes:
      - oneround-data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    command: ["-config", "/app/config.yaml"]
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  oneround-data:
