name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build server binary
        run: |
          cd apps/server
          GOOS=linux GOARCH=amd64 go build -o oneround-server ./cmd/oneround-server

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "apps/server/oneround-server"
          target: "/tmp"
          strip_components: 2

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo /usr/bin/systemctl stop oneround
            sudo /usr/bin/install -m 755 -o oneround -g oneround /tmp/oneround-server /opt/oneround/oneround-server
            sudo /usr/bin/systemctl start oneround
            curl -s http://127.0.0.1:8080/health
